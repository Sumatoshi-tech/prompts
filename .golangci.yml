# Generated by promptkit -- do not edit. Regenerate with: promptkit update

# golangci-lint v2 strict configuration
# Generated by promptkit for promptkit

version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  go: "1.25"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  uniq-by-line: false

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: true
  sort-results: true
  sort-order:
    - linter
    - file
  show-stats: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Sumatoshi-tech/promptkit

linters:
  # Enable ALL linters, only disable what's truly inapplicable.
  default: all
  disable:
    # --- Deprecated ---
    - wsl # Deprecated in v2; replaced by wsl_v5

    # --- Framework/DB-specific: not used in this project ---
    - arangolint # ArangoDB
    - ginkgolinter # Ginkgo testing framework
    - loggercheck # logr/klog/zap structured loggers
    - promlinter # Prometheus metrics naming
    - protogetter # Protobuf getters
    - rowserrcheck # database/sql rows.Err()
    - sqlclosecheck # database/sql Close()
    - zerologlint # zerolog

    # --- Too noisy for most codebases ---
    - exhaustruct # Go idiom is zero-value initialization; this linter fights the language
    - gochecknoglobals # CLI pattern requires package-level vars (cobra commands, registries, lookup tables)
    - gochecknoinits # CLI pattern uses init() for cobra command registration and ecosystem setup
    - testpackage # White-box testing (package foo, not foo_test) is standard Go practice

    # --- Conflicting linters ---
    - whitespace # Conflicts with wsl_v5: multi-func requires blank lines that wsl_v5 forbids
    - nonamedreturns # Conflicts with gocritic(unnamedResult): forbids named returns that gocritic requires for clarity
    - nlreturn # Conflicts with wsl_v5; blank-line-before-return is purely stylistic
    - noinlineerr # Inline error handling (if err := ...; err != nil) is idiomatic Go

  settings:
    cyclop:
      max-complexity: 15
      package-average: 7.0

    depguard:
      rules:
        "deprecated":
          files: ["$all"]
          deny:
            - pkg: github.com/golang/protobuf
              desc: "Use google.golang.org/protobuf instead"
            - pkg: github.com/satori/go.uuid
              desc: "Use github.com/google/uuid instead"
            - pkg: github.com/gofrs/uuid$
              desc: "Use github.com/gofrs/uuid/v5 or later"
        "non-test":
          files: ["!$test"]
          deny:
            - pkg: math/rand$
              desc: "Use math/rand/v2 instead"

    dupl:
      threshold: 100

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true
      check-blank: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true
      errorf-multi: true

    exhaustive:
      check: [switch, map]
      default-signifies-exhaustive: false

    exhaustruct:
      exclude:
        # Standard library
        - ^net/http\.(Client|Cookie|Request|Response|Server|Transport)$
        - ^net/url\.URL$
        - ^os/exec\.Cmd$
        - ^reflect\.StructField$
        # Third-party
        - ^github\.com/spf13/cobra\.(Command|CompletionOptions)$
        - ^github\.com/stretchr/testify/mock\.Mock$
        - ^golang\.org/x/tools/go/analysis\.Analyzer$
        - ^gopkg\.in/yaml\.v3\.Node$
      allow-empty-returns: true

    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: "Use log/slog for structured output instead of fmt.Print"
          pkg: ^fmt$
      analyze-types: true

    funcorder:
      struct-method: false

    funlen:
      lines: 80
      statements: 40
      ignore-comments: true

    gochecksumtype:
      default-signifies-exhaustive: false

    gocognit:
      min-complexity: 15

    goconst:
      min-len: 3
      min-occurrences: 3

    gocritic:
      enable-all: true
      disabled-checks:
        - hugeParam
        - rangeValCopy
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    gocyclo:
      min-complexity: 15

    godoclint:
      enable:
        - no-unused-link
        - require-stdlib-doclink

    godot:
      scope: all
      capital: false

    gomoddirectives:
      replace-local: true

    gosec:
      excludes:
        - G204 # Subprocess launched with variable - needed for command execution
      severity: medium
      confidence: medium

    govet:
      enable-all: true
      disable:
        - fieldalignment # conflicts with embeddedstructfieldcheck
      settings:
        shadow:
          strict: true

    iface:
      enable: [identical, unused, opaque]

    inamedparam:
      skip-single-param: true

    interfacebloat:
      max: 5

    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic

    lll:
      line-length: 140
      tab-width: 4

    maintidx:
      under: 20

    misspell:
      locale: US

    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - strconv.Format*
        - strconv.Parse*

    nakedret:
      max-func-lines: 0

    nestif:
      min-complexity: 4

    nilnil:
      checked-types: [ptr, func, iface, map, chan]

    nolintlint:
      allow-no-explanation: [funlen, gocognit, lll]
      require-explanation: true
      require-specific: true

    nonamedreturns:
      report-error-in-defer: true

    perfsprint:
      strconcat: false

    reassign:
      patterns: [".*"]

    revive:
      rules:
        - name: exported
          arguments: ["checkPrivateReceivers"]
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: range
        - name: context-keys-type
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: unexported-return
        - name: blank-imports
        - name: dot-imports
        - name: context-as-argument
        - name: early-return
        - name: unnecessary-stmt
        - name: receiver-naming
        - name: superfluous-else
        - name: confusing-naming
        - name: modifies-value-receiver
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: waitgroup-by-value
        - name: atomic
        - name: empty-block
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: identical-branches
        - name: modifies-parameter
        - name: string-of-int
        - name: defer
          arguments:
            - [
                "call-chain",
                "loop",
                "method-call",
                "recover",
                "immediate-recover",
                "return",
              ]
        - name: range-val-address
        - name: range-val-in-closure
        - name: get-return
        - name: string-format

    sloglint:
      no-global: all
      context: scope

    staticcheck:
      checks: [all]

    tagalign:
      align: true
      sort: true

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          xml: camel

    testifylint:
      enable-all: true

    unconvert:
      fast-math: true
      safe: true

    unparam:
      check-exported: false

    usestdlibvars:
      http-method: true
      http-status-code: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true

    usetesting:
      os-temp-dir: true

    varnamelen:
      max-distance: 6
      min-name-length: 2
      check-receiver: false
      check-return: true
      check-type-param: true
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-names:
        - ok
        - err
        - id
        - a
        - b
        - d
        - f
        - h
        - wg
        - mu
        - db
        - tx
        - fn
        - fs
        - ip
        - tt
        - tc
        - tb
        - sb
        - fd
        - rw
        - kv
        - ch
        - op
        - ln
        - cb
        - ts
        - tp
        - rc
        - dd
        - da
        - si
        - gh
        - nd
        - hp
      ignore-decls:
        - i int
        - j int
        - k int
        - n int
        - t testing.T
        - b testing.B
        - f testing.F
        - e error
        - w io.Writer
        - r io.Reader
        - s string

    whitespace:
      multi-if: true
      multi-func: true

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-package-globs:
        - github.com/Sumatoshi-tech/promptkit/*

    wsl_v5: {}

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      # Test files naturally have similar setup/assertion patterns and long test functions.
      - path: _test\.go
        linters: [dupl, funlen, gocognit, gocyclo, cyclop, nestif, errcheck, goconst]

      # CLI command handlers and config validation are inherently complex entry points.
      # errcheck: interactive input (fmt.Fscanln) errors are intentionally ignored.
      - path: (cmd/|internal/cli/|internal/config/|internal/prompt/)
        linters: [forbidigo, funlen, cyclop, gocognit, gocyclo, errcheck]

      # CLI and config validation errors are user-facing messages; dynamic formatting is appropriate.
      - path: (internal/cli/|internal/config/|internal/prompt/|internal/scaffold/|internal/adapters/)
        linters: [err113]

      # Diff and apply functions are inherently complex.
      - path: internal/scaffold/
        linters: [cyclop, gocognit, gocyclo, errcheck, funlen]

      # CLI display code uses magic numbers for formatting (column widths, truncation limits).
      # Config migration and scaffold logic has inherently nested/complex control flow.
      - path: (internal/cli/|internal/scaffold/|internal/config/)
        linters: [mnd, maintidx, nestif, wrapcheck]
